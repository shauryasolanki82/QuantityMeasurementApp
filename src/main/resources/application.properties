# ===============================
# APPLICATION
# ===============================
spring.application.name=quantity-measurement-app
server.port=${PORT:8080}

# ===============================
# DATABASE (H2 - In Memory)
# ===============================
spring.datasource.url=jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=1234
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JWT SECURITY
# ===============================
# Base64 encoded secret key
application.security.jwt.secret-key=ZmFrZVNlY3JldEtleTEyMzQ1Njc4OTA=
# 24 hours
application.security.jwt.expiration=86400000
# 7 days
application.security.jwt.refresh-token.expiration=604800000

# ===============================
# LOGGING
# ===============================
logging.level.com.app.quantitymeasurement=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# ===============================
# SWAGGER
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=always

# ===============================
# OPTIONAL: GOOGLE OAUTH (only if used)
# ===============================
# If you don't need Google login, you can remove these
spring.security.oauth2.client.registration.google.client-id=your-client-id
spring.security.oauth2.client.registration.google.client-secret=your-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile