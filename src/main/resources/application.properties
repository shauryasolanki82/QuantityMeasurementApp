# Repository type: "cache" or "database"
repository.type=database

# H2 In-Memory Database (Development)
db.url=jdbc:h2:mem:quantitydb;DB_CLOSE_DELAY=-1;INIT=RUNSCRIPT FROM 'classpath:db/schema.sql'
db.username=sa
db.password=
db.driver=org.h2.Driver

# Connection Pool
db.pool.size=10
db.pool.timeout=30000

# MySQL - uncomment for production
# db.url=jdbc:mysql://localhost:3306/quantitydb?useSSL=false&serverTimezone=UTC
# db.username=root
# db.password=yourpassword
# db.driver=com.mysql.cj.jdbc.Driver

# PostgreSQL - uncomment for production
# db.url=jdbc:postgresql://localhost:5432/quantitydb
# db.username=postgres
# db.password=yourpassword
# db.driver=org.postgresql.Driver